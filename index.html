<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>サロンデモサイト — AUNE</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Marcellus&family=Italiana&family=DM+Serif+Display:ital@0;1&family=Spectral:ital,wght@0,300;0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Shippori+Mincho+B1:wght@400;500;600&family=Noto+Serif+JP:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&family=Zen+Kaku+Gothic+Antique:wght@400;500&display=swap" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="designs/common.jsx"></script>
<script type="text/babel" src="designs/a-desktop.jsx"></script>
<script type="text/babel" src="designs/a-mobile.jsx"></script>
<script type="text/babel" src="designs/b-desktop.jsx"></script>
<script type="text/babel" src="designs/b-mobile.jsx"></script>
<script type="text/babel" src="designs/c-desktop.jsx"></script>
<script type="text/babel" src="designs/c-mobile.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="a" title="A 案 — Editorial Classic" subtitle="ベージュ × ディープブラウン × シャンパンゴールド / マガジン風・縦組み和文">
        <DCArtboard id="a-desktop" label="Desktop · 1440" width={1440} height={8250}>
          <ADesktop />
        </DCArtboard>
        <DCArtboard id="a-mobile" label="Mobile · 390" width={390} height={8850}>
          <AMobile />
        </DCArtboard>
        <DCPostIt top={40} left={1900} rotate={3} width={200}>
          A案：誌面のような余白と斜体ディスプレイで「品格」を立てる方向
        </DCPostIt>
      </DCSection>

      <DCSection id="b" title="B 案 — Modern Minimal" subtitle="アイボリー × ウォームトープ / 建築的・余白主導・モノクロマティック">
        <DCArtboard id="b-desktop" label="Desktop · 1440" width={1440} height={9450}>
          <BDesktop />
        </DCArtboard>
        <DCArtboard id="b-mobile" label="Mobile · 390" width={390} height={9250}>
          <BMobile />
        </DCArtboard>
        <DCPostIt top={40} left={1900} rotate={-3} width={200}>
          B案：色を抑え、活字とレイアウトで魅せる骨太な構成
        </DCPostIt>
      </DCSection>

      <DCSection id="c" title="C 案 — Organic Warm" subtitle="ピーチベージュ × テラコッタ / 角丸・有機的フォルム・柔らかな印象">
        <DCArtboard id="c-desktop" label="Desktop · 1440" width={1440} height={8400}>
          <CDesktop />
        </DCArtboard>
        <DCArtboard id="c-mobile" label="Mobile · 390" width={390} height={7700}>
          <CMobile />
        </DCArtboard>
        <DCPostIt top={40} left={1900} rotate={2} width={200}>
          C案：曲線と暖色アクセントで親しみと心地よさを前面に
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
